<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            background: #000 !important; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe {
            border: none;
            /* Using vh for width because of the 90deg rotation */
            width: 100vh; 
            height: 100vw;
            
            /* THE ROTATION: Turn 90 degrees to the right */
            transform: rotate(90deg);
            transform-origin: center;
            
            /* Keeps the center window clean and interactive */
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <iframe id="weather-frame" src="https://v2.weatherscan.net/?Manassas"></iframe>

    <script>
        // Simple hourly refresh to keep the data current
        setInterval(function() {
            var iframe = document.getElementById('weather-frame');
            var timestamp = new Date().getTime();
            iframe.src = "https://v2.weatherscan.net/?Manassas#" + timestamp;
        }, 3600000); 
    </script>
</body>
</html>
