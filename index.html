<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            background: #000 !important; 
        }

        iframe {
            position: absolute;
            top: 50%; left: 50%;
            /* Let the browser handle the content layout naturally */
            width: 100vh; 
            height: 100vw;
            border: none;
            
            /* Pure rotation, zero scaling/aspect scripts */
            transform: translate(-50%, -50%) rotate(90deg);
            
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <iframe id="weather-frame" src="https://v2.weatherscan.net/?Manassas"></iframe>

    <script>
        setInterval(function() {
            var iframe = document.getElementById('weather-frame');
            var timestamp = new Date().getTime();
            iframe.src = "https://v2.weatherscan.net/?Manassas#" + timestamp;
        }, 3600000); 
    </script>
</body>
</html>
