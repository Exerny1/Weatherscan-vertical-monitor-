<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            background: #000 !important; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe {
            /* We lock the width to 100% of the vertical screen */
            width: 100vw;
            /* We calculate the height to maintain the original 4:3 ratio */
            /* (100 / 4) * 3 = 75vw */
            height: 75vw; 
            
            border: none;
            
            /* HIGH-FPS LOCKS (Removed ScaleX stretching) */
            transform: perspective(1000px) translateZ(0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            
            image-rendering: pixelated;
            will-change: transform, contents;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <iframe id="weather-frame" src="https://v2.weatherscan.net/?Manassas"></iframe>

    <script>
        setInterval(function() {
            var iframe = document.getElementById('weather-frame');
            var timestamp = new Date().getTime();
            iframe.src = "https://v2.weatherscan.net/?Manassas#" + timestamp;
            console.log("Memory cleared. Original aspect preserved.");
        }, 3600000); 
    </script>
</body>
</html>
